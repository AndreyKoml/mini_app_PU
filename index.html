<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdU - Glass OS</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        /* --- CSS ПЕРЕМЕННЫЕ И ТЕМЫ --- */
        :root {
            --bg-color: #f7f7f5;
            --text-color: #1a1a1a;
            --accent-color: #8ce13b;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --icon-color: #333;
            --danger: #ff4757;
        }

        [data-theme="dark"] {
            --bg-color: #2b2b2b;
            --text-color: #ffffff;
            --glass-bg: rgba(40, 40, 40, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.3);
            --icon-color: #fff;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ФОН И ГЛОБАЛЬНЫЕ ЭЛЕМЕНТЫ --- */
        .bg-logo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80vh;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 4px var(--accent-color);
            opacity: 0.15;
            z-index: -1;
            filter: blur(8px);
            user-select: none;
        }

        .coin-counter {
            position: fixed;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 20px;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        /* --- СЕТКА И МОДУЛИ --- */
        .dashboard {
            display: none; 
            grid-template-columns: 1fr;
            gap: 20px;
            width: 90%;
            max-width: 800px;
            z-index: 1;
            margin-bottom: 120px;
        }
        
        @media (min-width: 600px) {
            .dashboard { grid-template-columns: 1fr 1fr; }
        }

        .dashboard.active { display: grid; }

        /* --- СТЕКЛЯННЫЕ КАРТОЧКИ --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px var(--glass-shadow);
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .glass-card.full-width { grid-column: 1 / -1; }

        .card-header {
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        /* --- ЭЛЕМЕНТЫ ФОРМ --- */
        .glass-input, .glass-select, .glass-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }
        [data-theme="dark"] .glass-input, [data-theme="dark"] .glass-select { background: rgba(0, 0, 0, 0.2); }
        .glass-input::placeholder { color: inherit; opacity: 0.6; }
        
        .glass-btn {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            border: none;
        }
        .glass-btn:hover { opacity: 0.8; }
        .glass-btn.secondary { background: rgba(0,0,0,0.1); color: var(--text-color); border: 1px solid var(--glass-border); }
        [data-theme="dark"] .glass-btn.secondary { background: rgba(255,255,255,0.1); }

        .flex-row { display: flex; gap: 10px; }

        /* --- СПИСКИ И ЭЛЕМЕНТЫ --- */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        [data-theme="dark"] .list-item { background: rgba(255,255,255,0.05); }
        
        .list-item-left { display: flex; align-items: center; gap: 10px; }
        .list-item input[type="checkbox"] { accent-color: var(--accent-color); width: 18px; height: 18px; cursor: pointer; }

        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .balance-display { font-size: 2rem; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .income-text { color: var(--accent-color); font-weight: bold; }
        .expense-text { color: var(--danger); font-weight: bold; }

        /* --- НИЖНИЙ ДОК --- */
        .dock {
            position: fixed;
            bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 8px 32px var(--glass-shadow);
            z-index: 100;
        }

        .dock-icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
            color: var(--icon-color);
            font-size: 20px;
        }
        .dock-icon:hover { background: rgba(128, 128, 128, 0.2); transform: translateY(-3px); }
        .dock-icon.active { background: var(--accent-color); color: #000; box-shadow: 0 0 10px var(--accent-color); }

        .theme-switch {
            appearance: none;
            width: 44px;
            height: 24px;
            background: rgba(128,128,128,0.3);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            outline: none;
            margin-left: 10px;
        }
        .theme-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .theme-switch:checked { background: var(--accent-color); }
        .theme-switch:checked::after { transform: translateX(20px); }

        .empty-state { text-align: center; opacity: 0.5; padding: 20px; font-style: italic; }
        .day-badge { background: var(--accent-color); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-logo">U</div>
    
    <div class="coin-counter" id="coinCounter">
        🪙 <span id="coinValue">0</span>
    </div>

    <div id="sharedViewContainer" class="dashboard" style="display: none; align-items: center; justify-content: center; width: 100%; max-width: 600px; grid-template-columns: 1fr;">
        </div>

    <div id="mainAppContainer" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <div class="dashboard active" id="module-schedule">
            <div class="glass-card full-width">
                <div class="card-header">
                    Сводка по доходам
                    <button class="glass-btn secondary" onclick="shareSchedule()" style="width: auto; padding: 5px 10px; font-size: 12px;" title="Поделиться расписанием">🔗 Поделиться планами</button>
                </div>
                <div class="flex-row">
                    <div style="flex: 1; text-align: center;">
                        <div style="font-size: 14px; opacity: 0.7;">Общий доход</div>
                        <div class="income-text" id="totalIncomeDisplay" style="font-size: 1.5rem;">0 ₽</div>
                    </div>
                    <div style="flex: 1; text-align: center; border-left: 1px solid var(--glass-border);">
                        <div style="font-size: 14px; opacity: 0.7;">План на неделю</div>
                        <div style="font-size: 1.5rem; font-weight: bold;"><span id="weeklyGoalDisplay">0</span> ₽</div>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-header">Задачи на день</div>
                <input type="text" id="dailyTaskInput" class="glass-input" placeholder="Что сделать сегодня?">
                <button class="glass-btn" onclick="addScheduleTask('day')">Добавить</button>
                <div id="dailyTasksList" style="margin-top: 15px;"></div>
            </div>

            <div class="glass-card">
                <div class="card-header">Планы на неделю</div>
                <select id="weekDaySelect" class="glass-select">
                    <option value="Пн">Понедельник</option><option value="Вт">Вторник</option><option value="Ср">Среда</option>
                    <option value="Чт">Четверг</option><option value="Пт">Пятница</option><option value="Сб">Суббота</option>
                    <option value="Вс">Воскресенье</option>
                </select>
                <input type="text" id="weeklyTaskInput" class="glass-input" placeholder="Задача на неделю">
                <button class="glass-btn" onclick="addScheduleTask('week')">Запланировать</button>
                <div id="weeklyTasksList" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div class="dashboard" id="module-tasks">
            <div class="glass-card full-width">
                <div class="card-header">Создать новый список</div>
                <div class="flex-row">
                    <input type="text" id="newListTitle" class="glass-input" placeholder="Название (Например: Покупки)" style="margin-bottom: 0;">
                    <button class="glass-btn" onclick="createNewList()" style="width: auto; white-space: nowrap;">Создать</button>
                </div>
            </div>
            <div id="customListsContainer" class="full-width" style="display: flex; flex-direction: column; gap: 20px; width: 100%;"></div>
        </div>

        <div class="dashboard" id="module-finance">
            <div class="glass-card full-width">
                <div class="card-header" style="justify-content: center;">Текущий баланс</div>
                <div class="balance-display" id="balanceDisplay">0 ₽</div>
            </div>
            <div class="glass-card">
                <div class="card-header">Новая операция</div>
                <input type="number" id="financeAmount" class="glass-input" placeholder="Сумма (₽)">
                <select id="financeType" class="glass-select">
                    <option value="income">Доход (+)</option>
                    <option value="expense">Расход (-)</option>
                </select>
                <input type="text" id="financeDesc" class="glass-input" placeholder="Описание">
                <button class="glass-btn" onclick="addTransaction()">Сохранить</button>
            </div>
            <div class="glass-card">
                <div class="card-header">История</div>
                <div id="financeList"></div>
            </div>
        </div>

        <div class="dashboard" id="module-efficiency">
            <div class="glass-card">
                <div class="card-header">Оценка дня</div>
                <select id="effScore" class="glass-select">
                    <option value="5">5 - Супер 🔥</option><option value="4">4 - Хорошо 👍</option>
                    <option value="3">3 - Нормально 😐</option><option value="2">2 - Мало успел 🥱</option>
                    <option value="1">1 - Зря 📉</option>
                </select>
                <input type="text" id="effNote" class="glass-input" placeholder="Комментарий">
                <button class="glass-btn" onclick="addEfficiencyScore()">Записать</button>
            </div>
            <div class="glass-card">
                <div class="card-header">Дневник</div>
                <div id="efficiencyList"></div>
            </div>
        </div>

        <div class="dock" id="mainDock">
            <div class="dock-icon active" title="Расписание" onclick="switchTab('schedule', this)">📅</div>
            <div class="dock-icon" title="Списки" onclick="switchTab('tasks', this)">📋</div>
            <div class="dock-icon" title="Финансы" onclick="switchTab('finance', this)">💰</div>
            <div class="dock-icon" title="Эффективность" onclick="switchTab('efficiency', this)">📈</div>
            <div style="width: 1px; height: 30px; background: var(--glass-border); margin: 0 5px;"></div>
            <input type="checkbox" class="theme-switch" id="themeToggle" title="Смена темы">
        </div>
    </div> <script>
        // Тема оформления
        const themeToggle = document.getElementById('themeToggle');
        if(localStorage.getItem('produ_theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeToggle.checked = true;
        }
        themeToggle.addEventListener('change', (e) => {
            if(e.target.checked) { document.body.setAttribute('data-theme', 'dark'); localStorage.setItem('produ_theme', 'dark'); } 
            else { document.body.removeAttribute('data-theme'); localStorage.setItem('produ_theme', 'light'); }
        });

        // Инициализация данных
        let data = JSON.parse(localStorage.getItem('produ_v4_data')) || {
            lists: [], schedule: [], finance: [], efficiency: [], coins: 0, incomeGoal: 0
        };

        function saveData() { localStorage.setItem('produ_v4_data', JSON.stringify(data)); renderAll(); }

        function switchTab(moduleName, element) {
            document.querySelectorAll('#mainAppContainer .dashboard').forEach(el => el.classList.remove('active'));
            document.getElementById(`module-${moduleName}`).classList.add('active');
            document.querySelectorAll('.dock-icon').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        // ================= ФУНКЦИИ ШЕРИНГА =================
        function copyToClipboard(shareUrl) {
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert('Ссылка скопирована в буфер обмена!\n\nОтправьте её другу.');
            }).catch(() => {
                prompt('Скопируйте ссылку вручную:', shareUrl);
            });
        }

        // Шеринг обычного списка
        function shareList(listId) {
            const list = data.lists.find(l => l.id === listId);
            if (!list) return;
            const snapshot = { t: list.title, i: list.items.map(item => ({ x: item.text, d: item.done })) };
            const encoded = btoa(encodeURIComponent(JSON.stringify(snapshot)));
            copyToClipboard(window.location.origin + window.location.pathname + '?list=' + encoded);
        }

        // Шеринг расписания
        function shareSchedule() {
            if (data.schedule.length === 0) return alert('Ваше расписание пока пусто!');
            // Формируем слепок для расписания
            const snapshot = data.schedule.map(item => ({ x: item.text, d: item.done, t: item.type, w: item.day }));
            const encoded = btoa(encodeURIComponent(JSON.stringify(snapshot)));
            copyToClipboard(window.location.origin + window.location.pathname + '?schedule=' + encoded);
        }

        // Рендер режима "Просмотр чужого списка"
        function renderSharedListView(encodedData) {
            try {
                document.getElementById('mainAppContainer').style.display = 'none';
                document.getElementById('coinCounter').style.display = 'none';
                
                const snapshot = JSON.parse(decodeURIComponent(atob(encodedData)));
                const container = document.getElementById('sharedViewContainer');
                container.style.display = 'flex';

                const itemsHtml = snapshot.i.map((item) => `
                    <div class="list-item" style="${item.d ? 'opacity: 0.6;' : ''}">
                        <div class="list-item-left">
                            <input type="checkbox" ${item.d ? 'checked' : ''} onclick="this.parentElement.parentElement.style.opacity = this.checked ? '0.6' : '1'; this.nextElementSibling.style.textDecoration = this.checked ? 'line-through' : 'none';">
                            <span style="${item.d ? 'text-decoration: line-through;' : ''}">${item.x}</span>
                        </div>
                    </div>
                `).join('') || '<div class="empty-state">Список пуст</div>';

                container.innerHTML = `
                    <div class="glass-card full-width" style="margin-top: 20px;">
                        <div class="card-header" style="justify-content: center;">📋 ${snapshot.t}</div>
                        <div style="margin-bottom: 20px;">${itemsHtml}</div>
                        <button class="glass-btn secondary" onclick="window.location.href = window.location.pathname">Создать свой ProdU</button>
                    </div>
                `;
            } catch (e) {
                alert('К сожалению, ссылка повреждена или недействительна.');
                window.location.href = window.location.pathname;
            }
        }

        // Рендер режима "Просмотр чужого расписания"
        function renderSharedScheduleView(encodedData) {
            try {
                document.getElementById('mainAppContainer').style.display = 'none';
                document.getElementById('coinCounter').style.display = 'none';
                
                const snapshot = JSON.parse(decodeURIComponent(atob(encodedData)));
                const container = document.getElementById('sharedViewContainer');
                container.style.display = 'flex';

                const dailyTasks = snapshot.filter(t => t.t === 'day');
                const weeklyTasks = snapshot.filter(t => t.t === 'week');

                const renderItems = (items) => items.map(item => `
                    <div class="list-item" style="${item.d ? 'opacity: 0.6;' : ''}">
                        <div class="list-item-left">
                            <input type="checkbox" ${item.d ? 'checked' : ''} onclick="this.parentElement.parentElement.style.opacity = this.checked ? '0.6' : '1'; this.nextElementSibling.style.textDecoration = this.checked ? 'line-through' : 'none';">
                            ${item.t === 'week' ? `<span class="day-badge">${item.w}</span>` : ''}
                            <span style="${item.d ? 'text-decoration: line-through;' : ''}">${item.x}</span>
                        </div>
                    </div>
                `).join('') || '<div class="empty-state">Нет задач</div>';

                container.innerHTML = `
                    <div class="glass-card full-width" style="margin-top: 20px;">
                        <div class="card-header" style="justify-content: center;">📅 Расписание</div>
                        <div style="margin-bottom: 15px;">
                            <div style="font-size: 14px; opacity: 0.7; margin-bottom: 10px;">Задачи на день:</div>
                            ${renderItems(dailyTasks)}
                        </div>
                        <div style="margin-bottom: 20px;">
                            <div style="font-size: 14px; opacity: 0.7; margin-bottom: 10px;">Планы на неделю:</div>
                            ${renderItems(weeklyTasks)}
                        </div>
                        <button class="glass-btn secondary" onclick="window.location.href = window.location.pathname">Создать свой ProdU</button>
                    </div>
                `;
            } catch (e) {
                alert('К сожалению, ссылка повреждена или недействительна.');
                window.location.href = window.location.pathname;
            }
        }

        // ================= ОСТАЛЬНЫЕ ФУНКЦИИ =================
        function createNewList() {
            const title = document.getElementById('newListTitle').value.trim();
            if (!title) return;
            data.lists.unshift({ id: Date.now(), title: title, items: [] });
            document.getElementById('newListTitle').value = ''; saveData();
        }
        function deleteList(listId) { if(confirm("Удалить список?")) { data.lists = data.lists.filter(l => l.id !== listId); saveData(); } }
        function addListItem(listId) {
            const input = document.getElementById(`itemInput_${listId}`);
            if (!input.value.trim()) return;
            const list = data.lists.find(l => l.id === listId);
            if (list) { list.items.push({ id: Date.now(), text: input.value.trim(), done: false }); input.value = ''; saveData(); }
        }
        function toggleListItem(listId, itemId) {
            const list = data.lists.find(l => l.id === listId);
            if (list) { const item = list.items.find(i => i.id === itemId); if (item) { item.done = !item.done; if(item.done) data.coins += 5; saveData(); } }
        }
        function deleteListItem(listId, itemId) {
            const list = data.lists.find(l => l.id === listId);
            if (list) { list.items = list.items.filter(i => i.id !== itemId); saveData(); }
        }

        function addScheduleTask(type) {
            const inputId = type === 'day' ? 'dailyTaskInput' : 'weeklyTaskInput';
            if (!document.getElementById(inputId).value.trim()) return;
            const dayStr = type === 'week' ? document.getElementById('weekDaySelect').value : 'Сегодня';
            data.schedule.push({ id: Date.now(), text: document.getElementById(inputId).value.trim(), type: type, day: dayStr, done: false });
            document.getElementById(inputId).value = ''; saveData();
        }
        function toggleSchedule(id) { const item = data.schedule.find(t => t.id === id); if (item) { item.done = !item.done; if(item.done) data.coins += 10; saveData(); } }
        function deleteSchedule(id) { data.schedule = data.schedule.filter(t => t.id !== id); saveData(); }

        function addTransaction() {
            const amount = parseFloat(document.getElementById('financeAmount').value);
            const desc = document.getElementById('financeDesc').value;
            if (!amount || !desc) return alert('Ошибка!');
            data.finance.push({ id: Date.now(), amount, type: document.getElementById('financeType').value, desc, date: new Date().toLocaleDateString() });
            document.getElementById('financeAmount').value = ''; document.getElementById('financeDesc').value = ''; saveData();
        }
        function deleteTransaction(id) { data.finance = data.finance.filter(t => t.id !== id); saveData(); }

        function addEfficiencyScore() {
            data.efficiency.push({ id: Date.now(), score: document.getElementById('effScore').value, note: document.getElementById('effNote').value, date: new Date().toLocaleDateString() });
            document.getElementById('effNote').value = ''; saveData();
        }
        function deleteEfficiency(id) { data.efficiency = data.efficiency.filter(e => e.id !== id); saveData(); }

        // ================= ГЛОБАЛЬНЫЙ РЕНДЕР =================
        function renderAll() {
            document.getElementById('coinValue').innerText = data.coins;
            
            document.getElementById('dailyTasksList').innerHTML = data.schedule.filter(t => t.type === 'day').map(task => `<div class="list-item" style="${task.done ? 'opacity: 0.6;' : ''}"><div class="list-item-left"><input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleSchedule(${task.id})"><span style="${task.done ? 'text-decoration: line-through;' : ''}">${task.text}</span></div><button class="delete-btn" onclick="deleteSchedule(${task.id})">X</button></div>`).join('');
            document.getElementById('weeklyTasksList').innerHTML = data.schedule.filter(t => t.type === 'week').map(task => `<div class="list-item" style="${task.done ? 'opacity: 0.6;' : ''}"><div class="list-item-left"><input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleSchedule(${task.id})"><span class="day-badge">${task.day}</span><span style="${task.done ? 'text-decoration: line-through;' : ''}">${task.text}</span></div><button class="delete-btn" onclick="deleteSchedule(${task.id})">X</button></div>`).join('');
            
            let balance = 0;
            document.getElementById('financeList').innerHTML = data.finance.map(trx => { const isIncome = trx.type === 'income'; isIncome ? balance += trx.amount : balance -= trx.amount; return `<div class="list-item"><div><div>${trx.desc}</div><small style="opacity: 0.6">${trx.date}</small></div><div style="display: flex; align-items: center; gap: 10px;"><span class="${isIncome ? 'income-text' : 'expense-text'}">${isIncome ? '+' : '-'}${trx.amount} ₽</span><button class="delete-btn" onclick="deleteTransaction(${trx.id})">X</button></div></div>`; }).reverse().join('');
            document.getElementById('balanceDisplay').innerText = `${balance} ₽`; document.getElementById('balanceDisplay').style.color = balance < 0 ? 'var(--danger)' : 'inherit';
            document.getElementById('totalIncomeDisplay').innerText = `${data.finance.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0)} ₽`;
            
            document.getElementById('efficiencyList').innerHTML = data.efficiency.map(item => `<div class="list-item"><div><strong>Оценка: ${item.score}/5</strong>${item.note ? `<br><small>${item.note}</small>` : ''}</div><div style="display: flex; align-items: center; gap: 10px;"><small style="opacity: 0.6">${item.date}</small><button class="delete-btn" onclick="deleteEfficiency(${item.id})">X</button></div></div>`).reverse().join('');

            const listsContainer = document.getElementById('customListsContainer');
            if (data.lists.length === 0) {
                listsContainer.innerHTML = '<div class="empty-state">У вас пока нет списков</div>';
            } else {
                listsContainer.innerHTML = data.lists.map(list => {
                    const itemsHtml = list.items.map(item => `<div class="list-item" style="${item.done ? 'opacity: 0.6;' : ''}"><div class="list-item-left"><input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleListItem(${list.id}, ${item.id})"><span style="${item.done ? 'text-decoration: line-through;' : ''}">${item.text}</span></div><button class="delete-btn" onclick="deleteListItem(${list.id}, ${item.id})">X</button></div>`).join('');
                    return `
                        <div class="glass-card full-width">
                            <div class="card-header">
                                ${list.title}
                                <div style="display: flex; gap: 5px;">
                                    <button class="glass-btn secondary" onclick="shareList(${list.id})" style="width: auto; padding: 5px 10px; font-size: 12px;" title="Поделиться списком">🔗 Ссылка</button>
                                    <button class="delete-btn" onclick="deleteList(${list.id})" style="background: rgba(255, 71, 87, 0.2); color: var(--danger); border: 1px solid var(--danger);">Удалить</button>
                                </div>
                            </div>
                            <div style="margin-bottom: 15px;">${itemsHtml || '<div style="opacity:0.5; font-size:12px; margin-bottom:10px;">Список пуст</div>'}</div>
                            <div class="flex-row">
                                <input type="text" id="itemInput_${list.id}" class="glass-input" placeholder="Добавить пункт..." style="margin-bottom: 0;">
                                <button class="glass-btn" onclick="addListItem(${list.id})" style="width: auto;">+</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        // ================= РОУТИНГ ПРИ ЗАПУСКЕ =================
        const urlParams = new URLSearchParams(window.location.search);
        const sharedListData = urlParams.get('list');
        const sharedScheduleData = urlParams.get('schedule');

        if (sharedListData) {
            renderSharedListView(sharedListData);
        } else if (sharedScheduleData) {
            renderSharedScheduleView(sharedScheduleData);
        } else {
            renderAll(); 
        }
    </script>
</body>
</html>
